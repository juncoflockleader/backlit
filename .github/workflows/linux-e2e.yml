name: Linux E2E

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  linux-e2e:
    name: Linux E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Ubuntu dependencies
        run: sudo ./scripts/bootstrap-ubuntu.sh

      - name: Install Rust stable components
        run: |
          rustup default stable
          rustup component add rustfmt clippy

      - name: Run Linux E2E gate
        run: ./scripts/verify-linux-e2e.sh target/linux-e2e-ci

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-e2e-artifacts
          path: target/linux-e2e-ci
